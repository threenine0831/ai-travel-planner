<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 생성 결과 | AI 여행 일정 플래너</title>
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">AI</span> AI 여행 일정 플래너</a>
      <button class="nav-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" data-nav-toggle>☰</button>
      <nav class="site-nav" data-site-nav aria-label="주요 메뉴">
        <a href="index.html" data-nav-link>홈</a>
        <a href="planner.html" data-nav-link>여행 계획 만들기</a>
        <a href="community.html" data-nav-link>커뮤니티</a>
        <a href="my-plans.html" data-nav-link>내 일정</a>
        <span class="user-chip" data-auth-user hidden></span>
        <a href="login.html" data-login-link>로그인</a>
        <a href="login.html?mode=signup" data-signup-link>회원가입</a>
        <button type="button" data-logout-button hidden>로그아웃</button>
      </nav>
    </header>

    <main class="page">
      <div class="container detail-layout">
        <div>
          <p class="eyebrow">생성 결과</p>
          <h1>AI가 만든 여행 일정</h1>
        </div>
        <div id="result-empty" class="empty-state" hidden>
          <h2>생성된 일정이 없습니다.</h2>
          <p>여행 정보를 입력하면 이곳에서 AI 일정을 확인할 수 있습니다.</p>
          <a class="button primary" href="planner.html">입력 화면으로 이동</a>
        </div>
        <section id="result-container" aria-live="polite"></section>
        <section class="form-panel">
          <h2>일정 저장</h2>
          <div class="visibility-box">
            <label><input id="is-public" type="checkbox"> 공개 일정으로 저장</label>
            <p class="muted">공개: 커뮤니티에서 누구나 조회 가능 · 비공개: 작성자 본인만 조회 가능</p>
          </div>
          <div class="form-actions">
            <button id="save-button" class="button primary" type="button">Firestore에 저장</button>
            <button id="regenerate-button" class="button secondary" type="button">AI 일정 다시 생성</button>
            <a class="button secondary" href="planner.html">입력 화면으로 돌아가기</a>
            <a id="detail-link" class="button secondary" href="#" hidden>내 일정 상세 보기</a>
          </div>
          <div id="save-status" class="message" aria-live="polite" hidden></div>
        </section>
      </div>
    </main>

    <div data-auth-message class="message warning" hidden></div>
    <script type="module" src="./js/result.js?v=20260623"></script>
  </body>
</html>
