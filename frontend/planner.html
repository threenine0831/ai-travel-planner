<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>여행 계획 만들기 | AI 여행 일정 플래너</title>
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">AI</span> AI 여행 일정 플래너</a>
      <button class="nav-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" data-nav-toggle>☰</button>
      <nav class="site-nav" data-site-nav aria-label="주요 메뉴">
        <a href="index.html" data-nav-link>홈</a>
        <a href="planner.html" data-nav-link>여행 계획 만들기</a>
        <a href="community.html" data-nav-link>커뮤니티</a>
        <a href="my-plans.html" data-nav-link>내 일정</a>
        <span class="user-chip" data-auth-user hidden></span>
        <a href="login.html" data-login-link>로그인</a>
        <a href="login.html?mode=signup" data-signup-link>회원가입</a>
        <button type="button" data-logout-button hidden>로그아웃</button>
      </nav>
    </header>

    <main class="page">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="eyebrow">AI 일정 생성</p>
            <h1>여행 정보를 입력해 주세요</h1>
            <p class="lead">입력한 조건은 안전하게 백엔드로 전달되고, 서버에서만 사용됩니다.</p>
          </div>
        </div>

        <form id="planner-form" class="form-panel" novalidate>
          <div class="input-grid">
            <label class="field">
              <span>여행 제목</span>
              <input type="text" name="title" maxlength="80" autocomplete="off" required>
              <small class="field-error" data-error-for="title"></small>
            </label>
            <label class="field">
              <span>여행지</span>
              <input type="text" name="destination" maxlength="80" autocomplete="off" required>
              <small class="field-error" data-error-for="destination"></small>
            </label>
            <label class="field">
              <span>여행 시작일</span>
              <input type="date" name="startDate" required>
              <small class="field-error" data-error-for="startDate"></small>
            </label>
            <label class="field">
              <span>여행 종료일</span>
              <input type="date" name="endDate" required>
              <small class="field-error" data-error-for="endDate"></small>
            </label>
            <label class="field">
              <span>총예산</span>
              <input type="number" name="budget" min="1" step="1000" inputmode="numeric" required>
              <small class="field-error" data-error-for="budget"></small>
            </label>
            <label class="field">
              <span>여행 인원</span>
              <input type="number" name="people" min="1" max="20" value="2" required>
              <small class="field-error" data-error-for="people"></small>
            </label>
            <fieldset class="field full">
              <legend class="fieldset-title">관심사</legend>
              <div class="interest-grid" data-field="interests">
                <label class="interest-chip"><input type="checkbox" name="interests" value="맛집"><span>맛집</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="관광"><span>관광</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="자연"><span>자연</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="쇼핑"><span>쇼핑</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="문화"><span>문화</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="휴식"><span>휴식</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="사진"><span>사진</span></label>
                <label class="interest-chip"><input type="checkbox" name="interests" value="액티비티"><span>액티비티</span></label>
              </div>
              <small class="field-error" data-error-for="interests"></small>
            </fieldset>
            <label class="field full">
              <span>추가 요청사항</span>
              <textarea name="additionalRequest" rows="5" maxlength="500" placeholder="예: 대중교통을 이용하고 해산물 식당을 포함해 주세요."></textarea>
              <small class="field-error" data-error-for="additionalRequest"></small>
            </label>
          </div>
          <div class="form-actions">
            <button id="generate-button" class="button primary" type="submit">AI 일정 생성</button>
            <a class="button secondary" href="index.html">홈으로 돌아가기</a>
          </div>
          <div id="planner-status" class="message" aria-live="polite" hidden></div>
        </form>
      </div>
    </main>

    <div data-auth-message class="message warning" hidden></div>
    <script type="module" src="./js/planner.js?v=20260623b"></script>
  </body>
</html>
