services:
  - type: web
    name: ai-travel-planner-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_AI_MODEL
        value: gemini-2.5-flash
      - key: RATE_LIMIT_PER_MINUTE
        value: 5
